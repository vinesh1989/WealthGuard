<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — WealthGuard</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--bg-base);
    }
    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 2rem; }
    .auth-logo-icon { width: 38px; height: 38px; background: var(--gold-muted); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .auth-logo-text { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--gold); }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--gold); text-decoration: none; }
    .success-state { text-align: center; padding: 1rem 0; }
    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .success-msg { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🛡</div>
      <div class="auth-logo-text">WealthGuard</div>
    </div>

    <div id="form-view">
      <div class="auth-title">Forgot Password?</div>
      <div class="auth-subtitle">Enter your email and we'll send you a link to reset your password.</div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="reset-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')sendReset()">
        <div class="form-error" id="email-error"></div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:0.25rem" id="reset-btn" onclick="sendReset()">Send Reset Link</button>

      <div class="auth-footer">
        <a href="index.html">← Back to Sign In</a>
      </div>
    </div>

    <div id="success-view" style="display:none">
      <div class="success-state">
        <div class="success-icon">📧</div>
        <div class="success-title">Check your inbox</div>
        <div class="success-msg">We've sent a password reset link to <strong id="sent-email"></strong>.<br><br>Click the link in the email to create a new password. The link expires in 1 hour.</div>
      </div>
      <button class="btn btn-outline" style="width:100%;margin-top:1.5rem" onclick="window.location.href='index.html'">Back to Sign In</button>
      <div class="auth-footer">
        Didn't get the email? <a href="#" onclick="resend()">Resend</a>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/supabase.js"></script>
<script>
async function sendReset() {
  const email = document.getElementById('reset-email').value.trim();
  const errEl = document.getElementById('email-error');
  errEl.textContent = '';
  if (!email || !email.includes('@')) { errEl.textContent = 'Please enter a valid email address'; return; }

  setLoading('reset-btn', true, 'Sending…');
  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/pages/reset-password.html'
    });
    if (error) throw error;
    document.getElementById('sent-email').textContent = email;
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    errEl.textContent = e.message || 'Failed to send reset email. Please try again.';
  } finally {
    setLoading('reset-btn', false, 'Send Reset Link');
  }
}

function resend() {
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('success-view').style.display = 'none';
}
</script>
</body>
</html>
