<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — WealthGuard</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: var(--bg-base); }
    .auth-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 420px; }
    .auth-logo { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 2rem; }
    .auth-logo-icon { width: 38px; height: 38px; background: var(--gold-muted); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .auth-logo-text { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--gold); }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }
    .password-strength { height: 4px; border-radius: 4px; margin-top: 0.4rem; transition: all 0.3s; }
    .pw-weak { background: #f87171; width: 33%; }
    .pw-medium { background: #fbbf24; width: 66%; }
    .pw-strong { background: #34d399; width: 100%; }
    .pw-label { font-size: 0.72rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🛡</div>
      <div class="auth-logo-text">WealthGuard</div>
    </div>
    <div class="auth-title">Create New Password</div>
    <div class="auth-subtitle">Choose a strong password for your account. You'll use this to sign in going forward.</div>

    <div id="reset-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="new-password" placeholder="••••••••" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')resetPassword()">
        <div id="strength-bar" class="password-strength" style="display:none"></div>
        <div id="strength-label" class="pw-label"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')resetPassword()">
        <div class="form-error" id="pass-error"></div>
      </div>
      <button class="btn btn-primary" style="width:100%" id="reset-btn" onclick="resetPassword()">Set New Password</button>
    </div>

    <div id="success-view" style="display:none;text-align:center;padding:1rem 0">
      <div style="font-size:3rem;margin-bottom:1rem">✅</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:0.5rem">Password Updated!</div>
      <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem">Your password has been successfully changed. You can now sign in with your new password.</div>
      <button class="btn btn-primary" style="width:100%" onclick="window.location.href='../index.html'">Sign In Now</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="../js/supabase.js"></script>
<script>
function checkStrength(val) {
  const bar = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  if (!val) { bar.style.display = 'none'; label.textContent = ''; return; }
  bar.style.display = 'block';
  bar.className = 'password-strength';
  if (val.length >= 12 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) {
    bar.classList.add('pw-strong'); label.textContent = '✓ Strong password'; label.style.color = '#34d399';
  } else if (val.length >= 8 && (/[A-Z]/.test(val) || /[0-9]/.test(val))) {
    bar.classList.add('pw-medium'); label.textContent = 'Medium — add numbers or symbols'; label.style.color = '#fbbf24';
  } else {
    bar.classList.add('pw-weak'); label.textContent = 'Weak — use 8+ characters'; label.style.color = '#f87171';
  }
}

async function resetPassword() {
  const pass = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  const errEl = document.getElementById('pass-error');
  errEl.textContent = '';

  if (pass.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; return; }
  if (pass !== confirm) { errEl.textContent = 'Passwords do not match'; return; }

  setLoading('reset-btn', true, 'Updating…');
  try {
    const { error } = await supabase.auth.updateUser({ password: pass });
    if (error) throw error;
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    errEl.textContent = e.message || 'Failed to update password. The link may have expired — please request a new one.';
  } finally {
    setLoading('reset-btn', false, 'Set New Password');
  }
}
</script>
</body>
</html>
